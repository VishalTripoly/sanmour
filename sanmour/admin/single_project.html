<script>

const API_URL = "http://localhost:8080";
const token = localStorage.getItem("adminToken");

const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");

let projectData = null;

/* LOAD PROJECT */

fetch(`${API_URL}/projects/${projectId}`)
.then(res => res.json())
.then(project => {

console.log(project.thumbnail);
projectData = project;

projectName.innerText = project.name;
projectType.innerText = project.type;
projectDescription.innerText = project.description;

projectClient.innerText = "Client: " + (project.client_name || "N/A");
projectTypeHeader.innerText = " | Type: " + (project.type || "N/A");
projectLocation.innerText = " | Location: " + (project.location || "N/A");

projectImage.src = `${API_URL}/${project.thumbnail}`;

/* NEW: Set dynamic background image */

const header = document.getElementById("projectHeader");

if(project.thumbnail){

const imagePath = project.thumbnail.replace(/\\/g,"/");

const finalURL = `${API_URL}/${imagePath}`;

console.log("Final Background URL:", finalURL);

header.style.backgroundImage = `url('${finalURL}')`;

}
/* Prefill edit form */

editName.value = project.name;
editType.value = project.type;
editDescription.value = project.description;

editClient.value = project.client_name || "";
editLocation.value = project.location || "";
});

/* GALLERY */

fetch(`${API_URL}/projects/${projectId}/images`)
.then(res => res.json())
.then(images => {

const gallery = document.getElementById("galleryContainer");
const noGalleryMsg = document.getElementById("noGalleryMsg");

if (!images.length) {
noGalleryMsg.style.display = "block";
return;
}

images.forEach(img => {

const wrapper = document.createElement("div");
wrapper.style.position = "relative";

const imageEl = document.createElement("img");
imageEl.src = `${API_URL}/${img.image_path}`;

const delBtn = document.createElement("button");

delBtn.innerText = "✖";

delBtn.style.position = "absolute";
delBtn.style.top = "5px";
delBtn.style.right = "5px";
delBtn.style.background = "red";
delBtn.style.color = "white";
delBtn.style.border = "none";
delBtn.style.borderRadius = "50%";
delBtn.style.cursor = "pointer";

delBtn.onclick = () => deleteGalleryImage(img.id);

wrapper.appendChild(imageEl);
wrapper.appendChild(delBtn);

gallery.appendChild(wrapper);

});

});

function deleteGalleryImage(imageId) {

if (!confirm("Delete this image?")) return;

fetch(`${API_URL}/admin/project-images/${imageId}`,{
method:"DELETE",
headers:{
Authorization:"Bearer "+token
}
})
.then(()=>{
alert("Image deleted");
location.reload();
})
.catch(()=>alert("Delete failed"));

}

/* EDIT BUTTON */

editBtn.onclick = () => {

viewSection.style.display="none";
editSection.style.display="block";

};

cancelEdit.onclick = () => {

editSection.style.display="none";
viewSection.style.display="block";

};

/* UPDATE PROJECT */

editForm.onsubmit = async e => {

e.preventDefault();

const payload = {

name: editName.value,
project_type: editType.value,
description: editDescription.value,

client_name: editClient.value,
location: editLocation.value,

};

/* Create FormData */
const formData = new FormData();

/* Add text fields */
Object.keys(payload).forEach(key=>{
formData.append(key,payload[key]);
});

/* Thumbnail upload */
const thumbnailFile = editThumbnail.files[0];

if(thumbnailFile){
formData.append("thumbnail",thumbnailFile);
}

try{

/* Update project */
await fetch(`${API_URL}/admin/projects/${projectId}`,{

method:"PUT",

headers:{
Authorization:"Bearer "+token
},

body:formData

});

/* Upload gallery images */

const galleryFiles = galleryUpload.files;

if(galleryFiles.length){

const galleryData = new FormData();

for(let file of galleryFiles){
galleryData.append("images",file);
}

await fetch(`${API_URL}/admin/projects/${projectId}/images`,{

method:"POST",

headers:{
Authorization:"Bearer "+token
},

body:galleryData

});

}

alert("Project updated");

location.reload();

}catch{

alert("Update failed");

}

};
</script>
