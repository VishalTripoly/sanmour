<!-- Dynamic Portfolio Logic (UNCHANGED) -->
<script>
const API_URL = 'http://localhost:8080';
let allProjects = [];

function loadProjects() {
    fetch(`${API_URL}/projects`)
        .then(res => res.json())
        .then(data => {
            allProjects = data || [];
            renderProjects();
            initIsotope();
        })
        .catch(() => {
            document.getElementById('portfolioContainer').innerHTML =
                '<p class="text-center">Unable to load projects.</p>';
        });
}

function renderProjects() {
    const container = document.getElementById('portfolioContainer');
    container.querySelectorAll('.element-item').forEach(e => e.remove());

    allProjects.forEach(project => {

        let type = (project.type || '').trim().toLowerCase();

        // 🔴 CRITICAL FIX: normalize categories
        if (type.includes('villa')) type = 'villa';
        else if (type.includes('residential')) type = 'residential';
        else if (type.includes('commercial')) type = 'commercial';
        else if (type.includes('school')) type = 'school';
        else if (type.includes('interior')) type = 'interior';

        const html = `
        <div class="col-md-3 col-sm-6 col-xs-12 element-item ${type}">
            <div class="portfolio-home2-item">
                <img src="${API_URL}/${project.thumbnail}"
                     class="img-responsive"
                     style="height:250px;object-fit:cover;"
                     onerror="this.onerror=null;this.src='${API_URL}/uploads/placeholder.png';">

                <div class="overlay">
                    <a href="single_project.html?id=${project.id}" class="cate-project pt-3">
                        ${project.type}
                    </a>
                    <h4>
                        <a href="single_project.html?id=${project.id}">
                            ${project.name}
                        </a>
                    </h4>
                </div>
            </div>
        </div>`;
        container.insertAdjacentHTML('beforeend', html);
    });
    // ✅ TELL ISOTOPE ABOUT NEW ITEMS
    const $container = $('.list-portfolio-warp');
    $container.isotope('reloadItems');
    $container.isotope({ sortBy: 'original-order' });
}

function initIsotope() {
    const $container = $('.list-portfolio-warp');
    $container.imagesLoaded(function () {
        $container.isotope({
            itemSelector: '.element-item',
            layoutMode: 'masonry'
        });

        $('.projectFilter').on('click', 'a', function (e) {
            e.preventDefault();
            $('.projectFilter a').removeClass('current');
            $(this).addClass('current');
            $container.isotope({ filter: $(this).data('filter') });
        });
    });
}

$(document).ready(loadProjects);
</script>
