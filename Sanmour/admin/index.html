<!DOCTYPE html>

<html lang="en">
<head>
    <!-- ================= PAGE META SETTINGS ================= -->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard - SANMOUR</title>

<!-- ================= CORE CSS FILES ================= -->
<link rel="stylesheet" href="../css/bootstrap.css">
<link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" rel="stylesheet">
<link rel="stylesheet" href="../fonts/font-awesome/css/font-awesome.min.css">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../css/dark.css">

<!-- ================= ADMIN DASHBOARD CUSTOM STYLES ================= -->
<style>

/* ===== SECTION HEADINGS ===== */
h2{
font-size:28px;
font-weight:600;
margin-top:30px;
margin-bottom:20px;
letter-spacing:0.5px;
}

h3{
font-size:22px;
font-weight:500;
margin-top:25px;
margin-bottom:15px;
}

.file-name{
font-size:13px;
color:#777;
margin-top:6px;
}

/* ===== FORM INPUT STYLING ===== */
.contact-input{
border:none !important;
border-bottom:1px solid #ccc !important;
background:transparent;
width:250px;
padding:5px;
}

.contact-input:focus{
outline:none;
border:none !important;
border-bottom:2px solid #333 !important;
box-shadow:none !important;
}

select.contact-input{
width:250px;
}

/* ===== FORM LAYOUT ===== */
.form-group{
display:flex;
align-items:center;
margin-bottom:18px;
}

.form-group label{
width:180px;
font-weight:500;
}

textarea.contact-input{
width:350px;
}

/* ===== ADMIN SECTIONS LAYOUT ===== */
.upload-section{
max-width:900px;
margin:0 auto;
padding:20px 40px;
}

.projects-section{
max-width:900px;
margin:40px auto;
padding:20px 40px;
}

/* ===== PROJECT TABLE IMAGE ===== */
table img{
width:60px;
height:45px;
object-fit:cover;
border-radius:4px;
}

/* ===== PAGINATION BUTTON AREA ===== */
.pagination{
margin-top:20px;
}

</style>

</head>

<body>

<!-- ================= ADMIN TOP NAVBAR ================= -->
<div class="navbar-admin">
<h1>Sanmour Admin Dashboard</h1>
<div>
<span id="adminEmail" style="margin-right:20px;"></span>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="container-admin">
<!-- ================= ADD NEW PROJECT FORM ================= -->
<div class="upload-section">
<h2>Add New Project</h2>

<form id="uploadForm" enctype="multipart/form-data">
<!-- ===== BASIC PROJECT INFORMATION ===== -->
<div class="form-row">

<div class="form-group">
<label>Project Name *</label>
<input type="text" class="contact-input" name="project_name" required>
</div>

<div class="form-group">
<label>Project Category *</label>
<select class="contact-input" name="project_type" required>
<option value="">Select</option>
<option value="residential">Residential</option>
<option value="commercial">Commercial</option>
<option value="villa">Independent Bungalows / Villa</option>
<option value="school">School</option>
<option value="interior">Interior</option>
</select>
</div>

</div>
<!-- ===== PROJECT DESCRIPTION ===== -->
<div class="form-group">
<label>Project Description *</label>
<textarea class="contact-input" name="description" rows="4" required></textarea>
</div>

<div class="form-row">
<!-- ===== PROJECT DETAILS ===== -->
<div class="form-group">
<label>Client Name</label>
<input type="text" class="contact-input" name="client_name">
</div>

<div class="form-group">
<label>Location</label>
<input type="text" class="contact-input" name="location">
</div>

</div>
<!-- ===== PROJECT THUMBNAIL UPLOAD ===== -->
<div class="form-group">
<label>Project Image *</label>
<input type="file" class="contact-input" id="thumbnail" name="thumbnail" required>
<div id="thumbnailName" class="file-name"></div>
</div>
<!-- ===== PROJECT STATUS ===== -->
<div class="form-group">
<label>Status</label>
<select class="contact-input" name="status">
<option value="active">Active</option>
<option value="inactive">Inactive</option>
</select>
</div>

<button type="submit" class="btn-submit">Upload Project</button>

</form>
</div>
<!-- ================= EXISTING PROJECTS TABLE ================= -->
<div class="projects-section">

<h2>Existing Projects</h2>

<table class="table table-bordered table-striped">

<thead>
<tr>
<th>ID</th>
<th>Project</th>
<th>Thumbnail</th>
<th>Action</th>
</tr>
</thead>

<tbody id="projectsList"></tbody>

</table>
<!-- ================= PROJECT PAGINATION ================= -->
<div id="pagination" class="text-center"></div>

</div>

<hr>
<!-- ================= PROJECT GALLERY UPLOAD ================= -->
<div class="upload-section">

<h3>Upload Project Gallery Images</h3>

<select id="galleryProjectSelect" class="contact-input" style="margin-bottom:10px;">
<option value="">Select Project</option>
</select>

<input type="file" id="galleryImages" class="contact-input" multiple>

<button onclick="uploadGalleryImages()" class="btn-submit" style="margin-top:10px;">
Upload Gallery Images
</button>

</div>

</div>
<!-- ================= JAVASCRIPT LIBRARIES ================= -->
<script src="../js/vendor/jquery.min.js"></script>

<script src="../js/vendor/bootstrap.js"></script>
<script src="../js/config.js"></script>

<!-- =====================================================
SANMOUR ADMIN DASHBOARD JAVASCRIPT
Handles:
- Authentication
- Project loading
- Pagination
- Upload project
- Upload gallery
- Delete project
===================================================== -->

<script>
/* API_URL is now defined in ../js/config.js */
/* Pagination variables */
let allProjects = [];     // stores all projects
let currentPage = 1;      // current page
const perPage = 8;        // projects per page

/* Check if admin is logged in */
function checkAuth(){
const token = localStorage.getItem("adminToken");
if(!token){
window.location.href="login.html";
return false;
}

document.getElementById("adminEmail").innerText =
"Logged in as: " + localStorage.getItem("adminEmail");

return true;
}
/* Show selected thumbnail file name */
document.getElementById("thumbnail").addEventListener("change",e=>{

const file = e.target.files[0];

if(!file) return;

document.getElementById("thumbnailName").innerText =
"Selected file: "+file.name;

});

/* Fetch all projects from backend */
async function loadProjects(){

if(!checkAuth()) return;

const select=document.getElementById("galleryProjectSelect");

const res = await fetch(`${API_URL}/projects`);
allProjects = await res.json();

select.innerHTML=`<option value="">Select Project</option>`;

allProjects.forEach(p=>{

const opt=document.createElement("option");
opt.value=p.id;
opt.textContent=p.name;

select.appendChild(opt);

});
/* Render projects for current page */
renderProjects();

}


function renderProjects(){

const start=(currentPage-1)*perPage;
const end=start+perPage;

const projects=allProjects.slice(start,end);

const projectsList=document.getElementById("projectsList");

let html="";

projects.forEach(p=>{

html+=`
<tr>

<td>${p.id}</td>

<td>${p.name}</td>

<td>
<img src="${API_URL}/${p.thumbnail}">
</td>

<td>

<a href="single_project.html?id=${p.id}"
class="btn btn-sm btn-primary">
View
</a>

<button class="btn btn-sm btn-danger"
onclick="deleteProject(${p.id})">
Delete
</button>

</td>

</tr>
`;

});

projectsList.innerHTML=html;

renderPagination();

}
/* Create pagination buttons */
function renderPagination(){

const totalPages=Math.ceil(allProjects.length/perPage);

let html="";

for(let i=1;i<=totalPages;i++){

html+=`
<button class="btn btn-sm ${i===currentPage?'btn-dark':'btn-light'}"
onclick="changePage(${i})">
${i}
</button>
`;

}

document.getElementById("pagination").innerHTML=html;

}

/* Switch pagination page */
function changePage(page){

currentPage=page;

renderProjects();

}

/* Submit new project to backend */
document.getElementById("uploadForm").addEventListener("submit",async e=>{

e.preventDefault();

const token=localStorage.getItem("adminToken");

const formData=new FormData(e.target);

try{

const res=await fetch(`${API_URL}/admin/projects`,{

method:"POST",

headers:{Authorization:"Bearer "+token},

body:formData

});

if(!res.ok){

const err=await res.json();

alert(err.error||"Project upload failed");

return;

}

alert("Project uploaded successfully");

location.reload();

}catch{

alert("Network error");

}

});

/* Upload gallery images for selected project */
function uploadGalleryImages(){

const projectId=document.getElementById("galleryProjectSelect").value;

const files=document.getElementById("galleryImages").files;

const token=localStorage.getItem("adminToken");

if(!projectId) return alert("Select a project");

if(!files.length) return alert("Select images");

const formData=new FormData();

for(let file of files){

formData.append("images",file);

}

fetch(`${API_URL}/admin/projects/${projectId}/images`,{

method:"POST",

headers:{Authorization:"Bearer "+token},

body:formData

})
.then(()=>{

alert("Gallery images uploaded successfully");

document.getElementById("galleryImages").value="";

})
.catch(()=>alert("Upload failed"));

}

/* Delete project from database */
async function deleteProject(id){

if(!confirm("Delete project?")) return;

const token=localStorage.getItem("adminToken");

await fetch(`${API_URL}/admin/projects/${id}`,{

method:"DELETE",

headers:{Authorization:"Bearer "+token}

});

location.reload();

}

/* Logout admin */
function logout(){

localStorage.clear();

window.location.href="login.html";

}

/* Initialize page */
checkAuth();

loadProjects();

</script>

</body>
</html>
