<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SANMOUR ARCHITECTS & CONSULTANTS (Admin Panel)</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../fonts/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/dark.css">
    
    <script src="../js/config.js"></script>
</head>
<body>
    <section>
        <div class="container">
            <div class="row">
                <div class="col-md-4"></div>
                <div class="col-md-4 offset-md-4">
                    <div class="login-form">
                        <h3 class="mb-5 text-center">Admin Login</h3>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" class="contact-input form-control" name="email" id="email" 
                                       placeholder="admin@sanmour.com" required>
                            </div>

                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" class="contact-input form-control" name="password" id="password" 
                                       placeholder="Enter password" required>
                            </div>

                            <div id="messageDiv"></div>

                            <div class="col-md-12">
                                <button type="submit" id="loginBtn" class="ot-btn border-dark btn-contact w-100">
                                    Login
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                 <div class="col-md-4"></div>
            </div>
        </div>
    </section>

    <script>
        // API_URL is now defined in ../js/config.js

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('messageDiv');
            const loginBtn = document.getElementById('loginBtn');

            // Disable button while processing
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    messageDiv.innerHTML = '<p class="success">✓ Login successful! Redirecting...</p>';
                    
                    // Save token and email to localStorage
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminEmail', email);

                    // Redirect after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = `<p class="error">✗ ${data.error || 'Login failed'}</p>`;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = '<p class="error">✗ Network error. Is the backend running?</p>';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
